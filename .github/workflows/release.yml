name: Build npm packages

on:
  workflow_dispatch:
    inputs:
      typst_version:
        description: Typst version without the v prefix
        required: true
        default: "0.15.0"
        type: string
      revision:
        description: npm packaging revision
        required: true
        default: "0"
        type: string

concurrency:
  group: npm-build-${{ inputs.typst_version }}-${{ inputs.revision }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-platform:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            runner: windows-latest
          - target: win32-arm64
            runner: windows-11-arm
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-x64
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build and test platform package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TYPST_VERSION: ${{ inputs.typst_version }}
          REVISION: ${{ inputs.revision }}
          TARGET: ${{ matrix.target }}
        run: >-
          npm run build:platform --
          --typst-version "$TYPST_VERSION"
          --revision "$REVISION"
          --target "$TARGET"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.target }}
          path: artifacts/*.tgz
          if-no-files-found: error
          retention-days: 14

  build-meta:
    name: Build launcher package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build launcher package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TYPST_VERSION: ${{ inputs.typst_version }}
          REVISION: ${{ inputs.revision }}
        run: >-
          npm run build:meta --
          --typst-version "$TYPST_VERSION"
          --revision "$REVISION"

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: package-meta
          path: artifacts/*.tgz
          if-no-files-found: error
          retention-days: 14

  collect:
    name: Collect npm packages
    needs: [build-platform, build-meta]
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: npm-packages
          merge-multiple: true

      - name: Verify package count
        shell: bash
        run: |
          set -euo pipefail
          count="$(find npm-packages -maxdepth 1 -name '*.tgz' -type f | wc -l)"
          test "$count" -eq 7
          find npm-packages -maxdepth 1 -name '*.tgz' -type f -print | sort

      - name: Upload complete package set
        uses: actions/upload-artifact@v4
        with:
          name: npm-packages-${{ inputs.typst_version }}-npm.${{ inputs.revision }}
          path: npm-packages/*.tgz
          if-no-files-found: error
          retention-days: 14
