name: Build and publish npm packages
run-name: Typst ${{ inputs.typst_version }} npm.${{ inputs.revision }} (${{ inputs.launcher_tag }})

on:
  workflow_dispatch:
    inputs:
      typst_version:
        description: Typst version without the v prefix
        required: true
        default: "0.15.0"
        type: string
      revision:
        description: npm packaging revision
        required: true
        default: "0"
        type: string
      release_scope:
        description: Build all packages or only the launcher
        required: true
        default: full
        type: choice
        options:
          - full
          - launcher-only
      platform_revision:
        description: Existing platform revision used by launcher-only releases
        required: false
        default: ""
        type: string
      launcher_tag:
        description: npm dist-tag for the launcher package
        required: true
        default: latest
        type: choice
        options:
          - latest
          - legacy

concurrency:
  group: npm-build-${{ inputs.typst_version }}-${{ inputs.revision }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    name: Plan release targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      package-count: ${{ steps.plan.outputs.package-count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create target matrix
        id: plan
        env:
          TYPST_VERSION: ${{ inputs.typst_version }}
        run: >-
          node scripts/release-plan.mjs
          --typst-version "$TYPST_VERSION"

  build-platform:
    name: Build ${{ matrix.target }}
    needs: plan
    if: inputs.release_scope == 'full'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Determine binary source
        id: target-plan
        shell: bash
        env:
          TYPST_VERSION: ${{ inputs.typst_version }}
          TARGET: ${{ matrix.target }}
        run: >-
          node scripts/target-build-plan.mjs
          --typst-version "$TYPST_VERSION"
          --target "$TARGET"

      - name: Checkout official Typst source
        if: steps.target-plan.outputs.source-build == 'true'
        uses: actions/checkout@v6
        with:
          repository: typst/typst
          ref: v${{ inputs.typst_version }}
          path: .work/upstream
          persist-credentials: false

      - name: Install musl build tools
        if: steps.target-plan.outputs.source-build == 'true' && runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install pinned Rust toolchain
        if: steps.target-plan.outputs.source-build == 'true'
        shell: bash
        env:
          RUST_VERSION: ${{ steps.target-plan.outputs.rust-version }}
          TARGET_TRIPLE: ${{ steps.target-plan.outputs.triple }}
        run: >-
          rustup toolchain install "$RUST_VERSION"
          --profile minimal
          --target "$TARGET_TRIPLE"

      - name: Build and test platform package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TYPST_VERSION: ${{ inputs.typst_version }}
          REVISION: ${{ inputs.revision }}
          TARGET: ${{ matrix.target }}
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: >-
          npm run build:platform --
          --typst-version "$TYPST_VERSION"
          --revision "$REVISION"
          --target "$TARGET"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.target }}
          path: artifacts/*.tgz
          if-no-files-found: error
          retention-days: 14

  build-meta:
    name: Build launcher package
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build launcher package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TYPST_VERSION: ${{ inputs.typst_version }}
          REVISION: ${{ inputs.revision }}
          PLATFORM_REVISION: ${{ inputs.platform_revision || inputs.revision }}
        run: >-
          npm run build:meta --
          --typst-version "$TYPST_VERSION"
          --revision "$REVISION"
          --platform-revision "$PLATFORM_REVISION"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: package-meta
          path: artifacts/*.tgz
          if-no-files-found: error
          retention-days: 14

  collect:
    name: Collect npm packages
    needs: [plan, build-platform, build-meta]
    if: >-
      ${{ always() &&
          needs.plan.result == 'success' &&
          needs.build-meta.result == 'success' &&
          (needs.build-platform.result == 'success' || needs.build-platform.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-*
          path: npm-packages
          merge-multiple: true

      - name: Verify package count
        shell: bash
        env:
          EXPECTED_PACKAGE_COUNT: ${{ inputs.release_scope == 'launcher-only' && 1 || needs.plan.outputs.package-count }}
        run: |
          set -euo pipefail
          count="$(find npm-packages -maxdepth 1 -name '*.tgz' -type f | wc -l)"
          test "$count" -eq "$EXPECTED_PACKAGE_COUNT"
          find npm-packages -maxdepth 1 -name '*.tgz' -type f -print | sort

      - name: Upload complete package set
        uses: actions/upload-artifact@v7
        with:
          name: npm-packages-${{ inputs.typst_version }}-npm.${{ inputs.revision }}
          path: npm-packages/*.tgz
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to npm
    needs: collect
    if: ${{ always() && needs.collect.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install OIDC-compatible npm
        run: npm install --global npm@11.12.1

      - name: Download complete package set
        uses: actions/download-artifact@v8
        with:
          name: npm-packages-${{ inputs.typst_version }}-npm.${{ inputs.revision }}
          path: npm-packages

      - name: Publish platform packages, then launcher
        shell: bash
        env:
          PACKAGE_VERSION: ${{ inputs.typst_version }}-npm.${{ inputs.revision }}
          LAUNCHER_TAG: ${{ inputs.launcher_tag }}
        run: |
          set -euo pipefail

          publish_if_missing() {
            local package_name="$1"
            local tarball="$2"
            local tag="$3"

            test -f "$tarball"

            if npm view "${package_name}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              echo "${package_name}@${PACKAGE_VERSION} is already published; ensuring ${tag} dist-tag"
              npm dist-tag add "${package_name}@${PACKAGE_VERSION}" "$tag"
              return
            fi

            local attempt
            for attempt in 1 2 3 4 5; do
              if npm publish "./$tarball" --access public --tag "$tag"; then
                return
              fi

              if npm view "${package_name}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
                echo "${package_name}@${PACKAGE_VERSION} became available after a concurrent publish; ensuring ${tag} dist-tag"
                npm dist-tag add "${package_name}@${PACKAGE_VERSION}" "$tag"
                return
              fi

              if [[ "$attempt" -eq 5 ]]; then
                echo "Failed to publish ${package_name}@${PACKAGE_VERSION} after ${attempt} attempts" >&2
                return 1
              fi

              echo "Publish attempt ${attempt} failed; retrying after registry propagation"
              sleep "$((attempt * 5))"
            done
          }

          launcher="npm-packages/flukxr-typst-cli-${PACKAGE_VERSION}.tgz"
          test -f "$launcher"

          while IFS= read -r tarball; do
            [[ "$tarball" == "$launcher" ]] && continue
            filename="${tarball##*/}"
            package_stem="${filename%-${PACKAGE_VERSION}.tgz}"
            package_name="@flukxr/${package_stem#flukxr-}"
            publish_if_missing "$package_name" "$tarball" "$LAUNCHER_TAG"
          done < <(find npm-packages -maxdepth 1 -name '*.tgz' -type f | sort)

          publish_if_missing \
            "@flukxr/typst-cli" \
            "$launcher" \
            "$LAUNCHER_TAG"
