name: Build and publish npm packages

on:
  workflow_dispatch:
    inputs:
      typst_version:
        description: Typst version without the v prefix
        required: true
        default: "0.15.0"
        type: string
      revision:
        description: npm packaging revision
        required: true
        default: "0"
        type: string
      launcher_tag:
        description: npm dist-tag for the launcher package
        required: true
        default: latest
        type: choice
        options:
          - latest
          - legacy

concurrency:
  group: npm-build-${{ inputs.typst_version }}-${{ inputs.revision }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-platform:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: win32-x64
            runner: windows-latest
          - target: win32-arm64
            runner: windows-11-arm
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-x64
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-15
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build and test platform package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TYPST_VERSION: ${{ inputs.typst_version }}
          REVISION: ${{ inputs.revision }}
          TARGET: ${{ matrix.target }}
        run: >-
          npm run build:platform --
          --typst-version "$TYPST_VERSION"
          --revision "$REVISION"
          --target "$TARGET"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.target }}
          path: artifacts/*.tgz
          if-no-files-found: error
          retention-days: 14

  build-meta:
    name: Build launcher package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build launcher package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TYPST_VERSION: ${{ inputs.typst_version }}
          REVISION: ${{ inputs.revision }}
        run: >-
          npm run build:meta --
          --typst-version "$TYPST_VERSION"
          --revision "$REVISION"

      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: package-meta
          path: artifacts/*.tgz
          if-no-files-found: error
          retention-days: 14

  collect:
    name: Collect npm packages
    needs: [build-platform, build-meta]
    runs-on: ubuntu-latest
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          pattern: package-*
          path: npm-packages
          merge-multiple: true

      - name: Verify package count
        shell: bash
        run: |
          set -euo pipefail
          count="$(find npm-packages -maxdepth 1 -name '*.tgz' -type f | wc -l)"
          test "$count" -eq 7
          find npm-packages -maxdepth 1 -name '*.tgz' -type f -print | sort

      - name: Upload complete package set
        uses: actions/upload-artifact@v7
        with:
          name: npm-packages-${{ inputs.typst_version }}-npm.${{ inputs.revision }}
          path: npm-packages/*.tgz
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish to npm
    needs: collect
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install OIDC-compatible npm
        run: npm install --global npm@11.12.1

      - name: Download complete package set
        uses: actions/download-artifact@v8
        with:
          name: npm-packages-${{ inputs.typst_version }}-npm.${{ inputs.revision }}
          path: npm-packages

      - name: Publish platform packages, then launcher
        shell: bash
        env:
          PACKAGE_VERSION: ${{ inputs.typst_version }}-npm.${{ inputs.revision }}
          LAUNCHER_TAG: ${{ inputs.launcher_tag }}
        run: |
          set -euo pipefail

          publish_if_missing() {
            local package_name="$1"
            local tarball="$2"
            local tag="$3"

            test -f "$tarball"

            if npm view "${package_name}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
              echo "${package_name}@${PACKAGE_VERSION} is already published; skipping"
              return
            fi

            npm publish "./$tarball" --access public --tag "$tag"
          }

          publish_if_missing \
            "@flukxr/typst-cli-win32-x64" \
            "npm-packages/flukxr-typst-cli-win32-x64-${PACKAGE_VERSION}.tgz" \
            "platform"
          publish_if_missing \
            "@flukxr/typst-cli-win32-arm64" \
            "npm-packages/flukxr-typst-cli-win32-arm64-${PACKAGE_VERSION}.tgz" \
            "platform"
          publish_if_missing \
            "@flukxr/typst-cli-linux-x64" \
            "npm-packages/flukxr-typst-cli-linux-x64-${PACKAGE_VERSION}.tgz" \
            "platform"
          publish_if_missing \
            "@flukxr/typst-cli-linux-arm64" \
            "npm-packages/flukxr-typst-cli-linux-arm64-${PACKAGE_VERSION}.tgz" \
            "platform"
          publish_if_missing \
            "@flukxr/typst-cli-darwin-x64" \
            "npm-packages/flukxr-typst-cli-darwin-x64-${PACKAGE_VERSION}.tgz" \
            "platform"
          publish_if_missing \
            "@flukxr/typst-cli-darwin-arm64" \
            "npm-packages/flukxr-typst-cli-darwin-arm64-${PACKAGE_VERSION}.tgz" \
            "platform"

          publish_if_missing \
            "@flukxr/typst-cli" \
            "npm-packages/flukxr-typst-cli-${PACKAGE_VERSION}.tgz" \
            "$LAUNCHER_TAG"
